version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: medapp
      POSTGRES_PASSWORD: medapp_dev_password
      POSTGRES_DB: med_app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://medapp:medapp_dev_password@postgres:5432/med_app_db
      JWT_SECRET: dev_jwt_secret_change_in_production_12345
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production_12345
      NODE_ENV: production
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5001
      SESSION_TIMEOUT_MINUTES: 15
      SEED_DATABASE: ${SEED_DATABASE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: medapp_network
